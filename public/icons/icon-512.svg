<svg xmlns='http://www.w3.org/2000/svg' width='512' height='512' viewBox='0 0 512 512'>
  <!-- Dark military green background -->
  <rect width='512' height='512' fill='#1A2E14'/>

  <!-- Bold double chevron — military rank insignia -->
  <!-- Gold (#B8A04A) on dark green, sharp corners, no curves -->
  <g transform='translate(256, 256)'>
    <!-- Top chevron (upper stripe) -->
    <polygon points='-150,-20 0,-110 150,-20 150,30 0,-60 -150,30' fill='#B8A04A'/>

    <!-- Bottom chevron (lower stripe) -->
    <polygon points='-150,70 0,-20 150,70 150,120 0,30 -150,120' fill='#B8A04A'/>
  </g>
</svg>
