<svg xmlns='http://www.w3.org/2000/svg' width='192' height='192' viewBox='0 0 192 192'>
  <!-- Dark military green background -->
  <rect width='192' height='192' fill='#1A2E14'/>

  <!-- Bold double chevron — military rank insignia -->
  <!-- Gold (#B8A04A) on dark green, sharp corners, no curves -->
  <g transform='translate(96, 96)'>
    <!-- Top chevron (upper stripe) -->
    <polygon points='-56,-8 0,-41 56,-8 56,11 0,-22 -56,11' fill='#B8A04A'/>

    <!-- Bottom chevron (lower stripe) -->
    <polygon points='-56,26 0,-7 56,26 56,45 0,12 -56,45' fill='#B8A04A'/>
  </g>
</svg>
